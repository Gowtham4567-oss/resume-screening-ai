<!DOCTYPE html>
<html>
<head>
    <title>Resume Screening AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Resume Screening AI</h1>

    <input type="file" id="resumeFile">
    <textarea id="jobDescription" placeholder="Enter job description"></textarea>

    <button onclick="uploadResume()">Analyze</button>

    <div id="result"></div>

    <div id="chatSection">
        <h2>AI Interview Trainer</h2>
        <div id="chatBox"></div>
        <input type="text" id="chatInput" placeholder="Type answer">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
